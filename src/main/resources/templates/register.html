<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        /* Те же стили, что и раньше (можно оставить как есть) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
        }
        h2 {
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
            color: #222;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: #222;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #000;
        }
        .error {
            color: #c00;
            font-size: 0.9rem;
            margin-top: -0.8rem;
            margin-bottom: 0.8rem;
            display: none;
        }
        .info {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
        }
        .info a {
            color: #222;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Регистрация</h2>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Имя пользователя" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="date" id="birth" placeholder="Дата рождения" required>  <!-- добавили поле birth -->
        <input type="password" id="password" placeholder="Пароль" required>
        <div class="error" id="errorMsg"></div>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <div class="info">
        Уже есть аккаунт? <a href="/auth/login">Войти</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const birth = document.getElementById('birth').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, birth, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token);
                window.location.href = '/profile'; // или на страницу профиля
            } else {
                const err = await response.text();
                errorDiv.textContent = err || 'Ошибка регистрации';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Сетевая ошибка';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
