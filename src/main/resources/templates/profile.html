<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
            color: #222;
        }
        .info-row {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        .label {
            font-weight: 500;
            width: 120px;
            color: #555;
        }
        .value {
            color: #222;
        }
        .logout-btn {
            margin-top: 2rem;
            width: 100%;
            padding: 0.9rem;
            background: #222;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: #000;
        }
        .error {
            color: #c00;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Профиль пользователя</h2>
    <div id="profile-info">
        <div class="info-row"><span class="label">ID:</span> <span class="value" id="userId"></span></div>
        <div class="info-row"><span class="label">Имя:</span> <span class="value" id="username"></span></div>
        <div class="info-row"><span class="label">Email:</span> <span class="value" id="email"></span></div>
        <div class="info-row"><span class="label">Дата рождения:</span> <span class="value" id="birth"></span></div>
        <div class="info-row"><span class="label">Роль:</span> <span class="value" id="role"></span></div>
    </div>
    <div class="error" id="errorMsg"></div>
    <button class="logout-btn" id="logoutBtn">Выйти</button>
</div>

<script>
    // Функция для загрузки профиля
    async function loadProfile() {
        const token = localStorage.getItem('token');
        if (!token) {
            // Если нет токена — редирект на логин
            window.location.href = '/auth/login';
            return;
        }

        try {
            const response = await fetch('/api/users/me', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const user = await response.json();
                // Заполняем поля
                document.getElementById('userId').textContent = user.id;
                document.getElementById('username').textContent = user.username;
                document.getElementById('email').textContent = user.email;
                document.getElementById('birth').textContent = user.birth; // формат YYYY-MM-DD
                document.getElementById('role').textContent = user.role;
            } else if (response.status === 401 || response.status === 403) {
                // Токен невалидный или просрочен — удаляем и редирект
                localStorage.removeItem('token');
                window.location.href = '/auth/login';
            } else {
                const err = await response.text();
                document.getElementById('errorMsg').textContent = err || 'Ошибка загрузки профиля';
            }
        } catch (err) {
            document.getElementById('errorMsg').textContent = 'Сетевая ошибка';
        }
    }

    // Выход
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/';
    });

    // Загружаем профиль при загрузке страницы
    window.addEventListener('load', loadProfile);
</script>
</body>
</html>
