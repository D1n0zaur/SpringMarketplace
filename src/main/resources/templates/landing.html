<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marketplace SelfPraktik</title>
    <style>
        /* Минималистичный CSS прямо в файле */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-weight: 400;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #222;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin: 1.5rem 0 2.5rem;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }
        .btn-primary {
            background: #222;
            color: white;
        }
        .btn-primary:hover {
            background: #000;
        }
        .btn-secondary {
            background: #eaeaea;
            color: #222;
        }
        .btn-secondary:hover {
            background: #d4d4d4;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Marketplace</h1>
    <h2>Добро пожаловать на мой pet-проект.</h2>
    <p>Данный проект был создан в целях практики в изучении Spring Boot и испытании собственных возможностей</p>
    <p>В процессе возможны доработки.</p>
    <div class="buttons">
        <a href="/auth/register" class="btn btn-primary">Регистрация</a>
        <a href="/auth/login" class="btn btn-secondary">Вход</a>
    </div>
</div>
</body>
</html>
